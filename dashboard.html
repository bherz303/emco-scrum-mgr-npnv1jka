<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Internal Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --orange:#EF8B22; --blue:#0979C3; --dark:#27343D; --gray:#53575A;
      --light:#F6F6F6; --green:#22C55E; --yellow:#F59E0B; --red:#DC2626; --white:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:var(--light);color:var(--gray);font-size:14px;line-height:1.5}

    .header{background:var(--dark);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
    .header-left{display:flex;align-items:center;gap:20px}
    .header img{height:38px;filter:brightness(0) invert(1)}
    .header-divider{width:1px;height:38px;background:rgba(255,255,255,.2)}
    .header-title h1{font-size:21px;font-weight:900;color:#fff;letter-spacing:-.3px}
    .header-title p{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px}
    .header-badge{background:var(--orange);color:#fff;font-weight:700;font-size:12px;padding:6px 14px;border-radius:20px;white-space:nowrap}

    .page{max-width:1100px;margin:0 auto;padding:26px 24px 48px}

    .filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:22px;padding:14px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:12px}
    .filter-presets{display:flex;gap:6px;flex-wrap:wrap}
    .filter-presets button{font-family:inherit;font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;border:1px solid #e5e7eb;background:#fff;color:var(--gray);cursor:pointer}
    .filter-presets button:hover{border-color:var(--orange)}
    .filter-presets button.active{background:var(--orange);color:#fff;border-color:var(--orange)}
    .filter-custom{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray)}
    .filter-custom input{font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid #e5e7eb;border-radius:6px;color:var(--gray)}
    .filter-custom button{font-family:inherit;font-size:12px;font-weight:700;padding:6px 12px;border-radius:6px;border:none;background:var(--blue);color:#fff;cursor:pointer}
    .filter-label{margin-left:auto;font-size:12px;font-weight:700;color:var(--dark)}

    .region-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:26px}
    .stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 20px}
    .stat-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);margin-bottom:8px}
    .stat-big{font-size:34px;font-weight:900;color:var(--dark);line-height:1}
    .stat-sub{font-size:12px;color:var(--gray);margin-top:6px}

    .section-header{display:flex;align-items:center;gap:12px;margin:26px 0 14px}
    .section-header h2{font-size:16px;font-weight:900;color:var(--dark)}

    .branch-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:8px}
    .branch-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 18px}
    .branch-card .bc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .branch-name{font-weight:700;font-size:14px;color:var(--dark)}
    .branch-mgr{font-size:12px;color:var(--gray)}
    .grade-chip{font-size:18px;font-weight:900;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff}
    .bc-score{font-size:26px;font-weight:900;color:var(--dark);line-height:1}
    .bc-score small{font-size:14px;font-weight:700;color:var(--gray)}
    .bc-trend{font-size:12px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:5px}
    .bc-avg{margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray)}
    .bc-avg-grade{font-size:12px;font-weight:900;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
    .bc-date{font-size:11px;color:#9ca3af;margin-top:8px}

    .chart-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 22px;margin-bottom:8px}
    .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
    .legend-dot{width:12px;height:3px;border-radius:2px}

    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;font-size:13px}
    th{background:#f9fafb;text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);border-bottom:1px solid #e5e7eb}
    td{padding:10px 14px;border-bottom:1px solid #f3f4f6}
    tr:last-child td{border-bottom:none}
    .grade-pill{font-weight:900;padding:2px 9px;border-radius:10px;font-size:12px;color:#fff}
    .legacy-tag{font-size:10px;color:#9ca3af;font-style:italic}

    .note-banner{background:#FEF3C7;border:1px solid #FADF98;border-radius:10px;padding:12px 16px;font-size:12px;color:#854d0e;margin-bottom:22px}

    .footer{margin-top:26px;font-size:12px;color:#9ca3af;text-align:center}

    tbody tr{cursor:pointer}
    tbody tr:hover{background:#fafafa}
    .row-hint{font-size:10px;color:#9ca3af;font-weight:400;text-transform:none;letter-spacing:0}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(39,52,61,.55);z-index:50;padding:24px;overflow-y:auto}
    .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
    .modal{background:#fff;border-radius:14px;max-width:760px;width:100%;margin:auto;padding:0;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .modal-close{position:absolute;top:14px;right:14px;border:none;background:#f3f4f6;color:var(--gray);width:30px;height:30px;border-radius:8px;font-size:14px;cursor:pointer}
    .modal-close:hover{background:#e5e7eb}
    .sc{padding:26px 28px}
    .sc-head{border-bottom:2px solid var(--orange);padding-bottom:14px;margin-bottom:16px}
    .sc-head h2{font-size:18px;font-weight:900;color:var(--dark)}
    .sc-head .sc-sub{font-size:13px;color:var(--gray);margin-top:3px}
    .sc-total{display:flex;align-items:center;gap:12px;margin:16px 0}
    .sc-total .sc-grade{font-size:22px;font-weight:900;width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff}
    .sc-total .sc-num{font-size:20px;font-weight:900;color:var(--dark)}
    .sc-total .sc-num small{font-size:13px;font-weight:700;color:var(--gray)}
    .sc-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);margin:18px 0 8px}
    .sc-crit{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px;line-height:1.45}
    .sc-crit .dot{flex-shrink:0;font-size:12px;margin-top:1px}
    .sc-crit .cn{font-weight:700;color:var(--dark)}
    .sc-action{font-size:13px;line-height:1.45;margin:4px 0 4px 0;padding-left:18px;position:relative}
    .sc-action:before{content:"→";position:absolute;left:0;color:var(--orange);font-weight:700}
    .sc-ind{border:1px solid #e5e7eb;border-radius:10px;padding:11px 14px;margin-bottom:8px}
    .sc-ind .ih{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
    .sc-ind .inm{font-weight:700;color:var(--dark);font-size:13px}
    .sc-ind .isc{font-weight:900;font-size:13px;color:var(--gray)}
    .sc-ind .iln{font-size:12px;color:var(--gray);line-height:1.5}
    .sc-summary{background:#F6F6F6;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--dark);line-height:1.5;margin-top:14px}
    .sc-copy{margin-top:18px;display:flex;gap:10px;align-items:center}
    .sc-copy button{font-family:inherit;font-size:13px;font-weight:700;padding:9px 18px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer}
    .sc-copy .copied{color:var(--green);font-size:12px;font-weight:700}
    .sc-nodetail{background:#FEF3C7;border:1px solid #FADF98;border-radius:10px;padding:12px 14px;font-size:12px;color:#854d0e}

    @media (max-width:768px){
      .region-row{grid-template-columns:1fr}
      .branch-grid{grid-template-columns:1fr}
      .header{flex-direction:column;align-items:flex-start}
      table{display:block;overflow-x:auto}
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="https://www.einsteinmoving.com/wp-content/uploads/2022/02/Einstein-Logo.svg" alt="Einstein Moving" />
      <div class="header-divider"></div>

  <div class="page">

        <button data-preset="lifetime" class="active">Lifetime</button>
        <button data-preset="week">Last 7 days</button>
        <button data-preset="month">Last 30 days</button>
        <button data-preset="quarter">This Quarter</button>
      </div>
      <div class="filter-custom">
        <label>From <input type="date" id="fromDate" /></label>
        <label>To <input type="date" id="toDate" /></label>
        <button id="applyCustom">Apply</button>
      </div>
      <div class="filter-label" id="filterLabel"></div>
    </div>

    <div class="region-row" id="regionRow"></div>

    <div class="note-banner" id="noteBanner"></div>

    <div class="section-header"><h2>Score Trend by Branch</h2></div>
    <div class="chart-wrap">
      <div id="chart"></div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="section-header"><h2>Latest Snapshot</h2></div>
    <div class="branch-grid" id="branchGrid"></div>

    <div class="section-header"><h2>Full Eval History</h2></div>
    <div id="tableWrap"></div>

    <div class="footer" id="footer"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" title="Close">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const DATA = JSON.parse(document.getElementById('scoreData').textContent);
    const BRANCH_COLORS = {
      north_austin:'#EF8B22', south_austin:'#0979C3', leander:'#22C55E',
      san_antonio:'#9d50dd', houston:'#DC2626'
    };
    const gradeColor = g => ({A:'#22C55E',B:'#16a34a',C:'#F59E0B',D:'#EF8B22',F:'#DC2626'}[g]||'#757575');
    const pctToGrade = p => p>=90?'A':p>=80?'B':p>=70?'C':p>=60?'D':'F';
    const fmtDate = d => { const [y,m,day]=d.split('-'); return `${+m}/${+day}`; };
    const branchKeys = Object.keys(DATA.branches);

    // ---- Note banner (static) ----
    document.getElementById('noteBanner').innerHTML =
      `⚠️ Entries before 7/9 (rubric v1.0 and v1.2) predate the current wording of the BH-7, BH-8 and BH-9 criteria. Treat pre-7/9 scores as directional. Current rubric: <strong>v${DATA.meta.current_rubric_version}</strong>.`;
    document.getElementById('footer').textContent = `Last updated ${DATA.meta.last_updated} · Data source: scrum-scores.json · Einstein Moving Company`;

    // ---- Date range helpers ----
    const allDates = DATA.evals.map(e=>e.date).sort();
    const minDate = allDates[0], maxDate = allDates[allDates.length-1];
    // "today" for relative presets: use the later of real today or the newest logged read,
    // so presets stay meaningful even when viewing historical data.
    const isoToday = new Date().toISOString().slice(0,10);
    const refToday = isoToday > maxDate ? isoToday : maxDate;
    const shiftDays = (iso,n)=>{ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
    // Einstein quarters are offset: Q2 = May/Jun/Jul. Compute the quarter window containing refToday.
    function quarterWindow(iso){
      const [y,m]=iso.split('-').map(Number);
      // offset month into quarter buckets starting Feb
      const starts=[[2,'01'],[5,'01'],[8,'01'],[11,'01']]; // Feb, May, Aug, Nov
      let qStartMonth, qYear=y;
      if(m>=2&&m<=4){qStartMonth=2;} else if(m>=5&&m<=7){qStartMonth=5;}
      else if(m>=8&&m<=10){qStartMonth=8;} else {qStartMonth=11; if(m===1)qYear=y-1;}
      const from=`${qYear}-${String(qStartMonth).padStart(2,'0')}-01`;
      const to=shiftDays(`${qStartMonth===11?qYear+1:qYear}-${String(qStartMonth+3>12?qStartMonth-9:qStartMonth+3).padStart(2,'0')}-01`,-1);
      return {from,to};
    }

    let state = { from:minDate, to:maxDate, preset:'lifetime' };

    function computeRange(preset){
      if(preset==='lifetime') return {from:minDate,to:maxDate};
      if(preset==='week')  return {from:shiftDays(refToday,-6), to:refToday};
      if(preset==='month') return {from:shiftDays(refToday,-29), to:refToday};
      if(preset==='quarter') return quarterWindow(refToday);
      return {from:minDate,to:maxDate};
    }

    // ---- Master render ----
    function render(){
      const {from,to}=state;
      const evals = DATA.evals.filter(e=> e.date>=from && e.date<=to);

      // filter label
      const presetName = {lifetime:'Lifetime',week:'Last 7 days',month:'Last 30 days',quarter:'This Quarter',custom:'Custom range'}[state.preset]||'Custom range';
      document.getElementById('filterLabel').textContent =
        `${presetName}: ${fmtDate(from)}/${from.slice(2,4)} – ${fmtDate(to)}/${to.slice(2,4)} · ${evals.length} read${evals.length!==1?'s':''}`;

      // ---- Region stats over the range ----
      const latestByBranch={}, statsByBranch={};
      branchKeys.forEach(bk=>{
        const h=evals.filter(e=>e.branch===bk).sort((a,b)=>a.date.localeCompare(b.date));
        if(h.length){
          latestByBranch[bk]=h[h.length-1];
          statsByBranch[bk]={
            hist:h,
            avgScore:h.reduce((s,e)=>s+e.score,0)/h.length,
            avgPct:Math.round(h.reduce((s,e)=>s+e.pct,0)/h.length)
          };
        }
      });
      const latest=Object.values(latestByBranch);
      const branchAvgs=Object.values(statsByBranch);
      // region average = average of each branch's average over the range (equal weight per branch)
      const regionAvg = branchAvgs.length ? Math.round(branchAvgs.reduce((s,b)=>s+b.avgPct,0)/branchAvgs.length) : 0;
      const passing = branchAvgs.filter(b=>b.avgPct>=60).length;

      document.getElementById('regionRow').innerHTML = `
        <div class="stat-card"><h3>Region Average</h3><div class="stat-big">${regionAvg}%</div><div class="stat-sub">avg of ${branchAvgs.length} branch averages in range · grade ${pctToGrade(regionAvg)}</div></div>
        <div class="stat-card"><h3>Branches Passing</h3><div class="stat-big">${passing}<small style="font-size:16px;color:#9ca3af"> / ${branchAvgs.length}</small></div><div class="stat-sub">branch average 60% or higher</div></div>
        <div class="stat-card"><h3>Evals in Range</h3><div class="stat-big">${evals.length}</div><div class="stat-sub">of ${DATA.evals.length} logged all-time</div></div>
      `;

      // ---- Chart over the range ----
      const dates=[...new Set(evals.map(e=>e.date))].sort();
      const W=1040,H=280,padL=42,padR=16,padT=16,padB=34;
      const plotW=W-padL-padR, plotH=H-padT-padB;
      const xFor=i=> dates.length<=1 ? padL+plotW/2 : padL+(i/(dates.length-1))*plotW;
      const yFor=pct=> padT+(1-pct/100)*plotH;
      let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">`;
      [0,20,40,60,80,100].forEach(v=>{const y=yFor(v);
        svg+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${v===60?'#22C55E':'#eef0f2'}" stroke-width="${v===60?1.5:1}" stroke-dasharray="${v===60?'4 3':'0'}"/>`;
        svg+=`<text x="${padL-8}" y="${y+3}" text-anchor="end" font-size="10" fill="#9ca3af" font-family="Roboto">${v}%</text>`;});
      if(dates.length){
        dates.forEach((d,i)=>{svg+=`<text x="${xFor(i)}" y="${H-12}" text-anchor="middle" font-size="10" fill="#9ca3af" font-family="Roboto">${fmtDate(d)}</text>`;});
        svg+=`<text x="${W-padR}" y="${yFor(60)-5}" text-anchor="end" font-size="9" fill="#22C55E" font-family="Roboto" font-weight="700">PASS 60%</text>`;
        branchKeys.forEach(bk=>{
          const pts=evals.filter(e=>e.branch===bk).sort((a,b)=>a.date.localeCompare(b.date));
          if(!pts.length) return; const color=BRANCH_COLORS[bk]; let path='';
          pts.forEach(p=>{const x=xFor(dates.indexOf(p.date)),y=yFor(p.pct); path+=(path?'L':'M')+x+' '+y+' ';});
          if(pts.length>1) svg+=`<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>`;
          pts.forEach(p=>{const x=xFor(dates.indexOf(p.date)),y=yFor(p.pct); svg+=`<circle cx="${x}" cy="${y}" r="4" fill="${color}"/>`;});
        });
      } else {
        svg+=`<text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="14" fill="#9ca3af" font-family="Roboto">No reads in this range</text>`;
      }
      svg+=`</svg>`;
      document.getElementById('chart').innerHTML=svg;
      document.getElementById('legend').innerHTML = branchKeys.map(bk=>
        `<div class="legend-item"><span class="legend-dot" style="background:${BRANCH_COLORS[bk]}"></span>${DATA.branches[bk].name}</div>`).join('');

      // ---- Branch cards over the range ----
      document.getElementById('branchGrid').innerHTML = branchKeys.map(bk=>{
        const st=statsByBranch[bk];
        if(!st){
          return `<div class="branch-card">
            <div class="bc-top"><div><div class="branch-name">${DATA.branches[bk].name}</div><div class="branch-mgr">${DATA.branches[bk].manager}</div></div>
            <div class="grade-chip" style="background:#c4c4c4">–</div></div>
            <div class="bc-date" style="margin-top:10px">No reads in this range</div></div>`;
        }
        const hist=st.hist, cur=hist[hist.length-1], prev=hist.length>1?hist[hist.length-2]:null;
        let trend='<span style="color:#9ca3af">— only one read in range</span>';
        if(prev){const d=cur.pct-prev.pct;
          if(d>0) trend=`<span style="color:#22C55E">▲ +${d} pts vs prior</span>`;
          else if(d<0) trend=`<span style="color:#DC2626">▼ ${d} pts vs prior</span>`;
          else trend=`<span style="color:#9ca3af">▬ flat vs prior</span>`;}
        const avgGrade=pctToGrade(st.avgPct);
        return `<div class="branch-card">
          <div class="bc-top">
            <div><div class="branch-name">${DATA.branches[bk].name}</div><div class="branch-mgr">${DATA.branches[bk].manager}</div></div>
            <div class="grade-chip" style="background:${gradeColor(cur.grade)}">${cur.grade}</div>
          </div>
          <div class="bc-score">${cur.score}<small> / ${cur.max}</small> &nbsp;<span style="font-size:15px;color:var(--gray)">${cur.pct}% latest</span></div>
          <div class="bc-trend">${trend}</div>
          <div class="bc-avg">
            <span class="bc-avg-grade" style="background:${gradeColor(avgGrade)}">${avgGrade}</span>
            <span>Avg <strong>${st.avgScore.toFixed(1)} / 60</strong> · ${st.avgPct}% <span style="color:#9ca3af">(${hist.length} read${hist.length>1?'s':''})</span></span>
          </div>
          <div class="bc-date">Latest ${fmtDate(cur.date)}${cur.rubric_version!==DATA.meta.current_rubric_version?' · v'+cur.rubric_version+' rubric':''}</div>
        </div>`;
      }).join('');

      // ---- History table over the range ----
      const trows=[...evals].sort((a,b)=> b.date.localeCompare(a.date) || a.branch.localeCompare(b.branch));
      document.getElementById('tableWrap').innerHTML = `<table>
        <thead><tr><th>Date</th><th>Branch</th><th>Manager</th><th>Score</th><th>%</th><th>Grade</th><th>Rubric <span class="row-hint">· click a row for the full scorecard</span></th></tr></thead>
        <tbody>${trows.length?trows.map(e=>`<tr data-key="${e.date}|${e.branch}">
          <td>${fmtDate(e.date)}/${e.date.slice(2,4)}</td>
          <td>${DATA.branches[e.branch].name}</td>
          <td>${DATA.branches[e.branch].manager}</td>
          <td>${e.score} / ${e.max}</td>
          <td>${e.pct}%</td>
          <td><span class="grade-pill" style="background:${gradeColor(e.grade)}">${e.grade}</span></td>
          <td>${e.rubric_version!==DATA.meta.current_rubric_version?'<span class="legacy-tag">v'+e.rubric_version+'</span>':'v'+e.rubric_version}</td>
        </tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:#9ca3af">No reads in this range</td></tr>'}</tbody></table>`;

      // wire row clicks
      document.querySelectorAll('#tableWrap tbody tr[data-key]').forEach(tr=>{
        tr.addEventListener('click',()=>openScorecard(tr.dataset.key));
      });
    }

    // ---- Scorecard detail modal ----
    const dotFor = pts => pts>=5?'🟢':pts>=3?'🟡':'🔴';

    function evalByKey(key){
      const [date,branch]=key.split('|');
      return DATA.evals.find(e=>e.date===date && e.branch===branch);
    }

    // build a clean plain-text scorecard for copy/paste to a manager
    function scorecardText(e){
      const b=DATA.branches[e.branch], d=e.detail;
      const L=[];
      L.push(`Scrum Board Hygiene — ${b.name} / ${b.manager} — ${fmtDate(e.date)}/${e.date.slice(0,4)}`);
      L.push('');
      L.push(`Score: ${e.score} out of 60 (${e.pct}%) — Grade ${e.grade}`);
      if(d){
        L.push('');
        d.criteria.forEach(c=>{ L.push(`${dotFor(c[1])} ${c[0]} (${c[1]}) — ${c[2]}`); });
        if(d.actions&&d.actions.length){ L.push(''); L.push('Top Action Items:'); d.actions.forEach(a=>L.push(`  - ${a}`)); }
        if(d.individuals&&d.individuals.length){ L.push(''); L.push('Individual Breakdown:'); d.individuals.forEach(i=>{ L.push(`  ${i[0]} — ${i[1]} of ${i[2]}`); L.push(`    ${i[3]}`); }); }
        if(d.summary){ L.push(''); L.push(d.summary); }
      } else if(e.note){ L.push(''); L.push(e.note); }
      return L.join('\n');
    }

    function openScorecard(key){
      const e=evalByKey(key); if(!e) return;
      const b=DATA.branches[e.branch], d=e.detail;
      let html=`<div class="sc">
        <div class="sc-head">
          <h2>${b.name} — ${b.manager}</h2>
          <div class="sc-sub">Scrum Board Hygiene · ${fmtDate(e.date)}/${e.date.slice(0,4)} · rubric v${e.rubric_version}</div>
        </div>
        <div class="sc-total">
          <div class="sc-grade" style="background:${gradeColor(e.grade)}">${e.grade}</div>
          <div class="sc-num">${e.score}<small> / 60</small> &nbsp; ${e.pct}%</div>
        </div>`;
      if(d){
        html+=`<div class="sc-section-title">Criteria Breakdown</div>`;
        d.criteria.forEach(c=>{ html+=`<div class="sc-crit"><span class="dot">${dotFor(c[1])}</span><span><span class="cn">${c[0]} (${c[1]})</span> — ${c[2]}</span></div>`; });
        if(d.actions&&d.actions.length){ html+=`<div class="sc-section-title">Top Action Items</div>`; d.actions.forEach(a=>html+=`<div class="sc-action">${a}</div>`); }
        if(d.individuals&&d.individuals.length){
          html+=`<div class="sc-section-title">Individual Breakdown</div>`;
          d.individuals.forEach(i=>{ html+=`<div class="sc-ind"><div class="ih"><span class="inm">${i[0]}</span><span class="isc">${i[1]} / ${i[2]}</span></div><div class="iln">${i[3]}</div></div>`; });
        }
        if(d.summary) html+=`<div class="sc-summary">${d.summary}</div>`;
      } else {
        html+=`<div class="sc-nodetail">Full per-criterion findings weren't captured for this read${e.note?' — summary note below.':'.'}</div>`;
        if(e.note) html+=`<div class="sc-summary" style="margin-top:10px">${e.note}</div>`;
      }
      html+=`<div class="sc-copy"><button id="copyBtn">Copy scorecard</button><span class="copied" id="copiedMsg" style="display:none">✓ Copied — paste to your manager</span></div>
      </div>`;
      document.getElementById('modalBody').innerHTML=html;
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('copyBtn').addEventListener('click',async()=>{
        const txt=scorecardText(e);
        try{ await navigator.clipboard.writeText(txt); }
        catch(_){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
        document.getElementById('copiedMsg').style.display='inline';
      });
    }

    function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
    document.getElementById('modalClose').addEventListener('click',closeModal);
    document.getElementById('modalOverlay').addEventListener('click',ev=>{ if(ev.target.id==='modalOverlay') closeModal(); });
    document.addEventListener('keydown',ev=>{ if(ev.key==='Escape') closeModal(); });

    // ---- Wire up controls ----
    const presetWrap=document.getElementById('filterPresets');
    presetWrap.addEventListener('click',ev=>{
      const btn=ev.target.closest('button'); if(!btn) return;
      presetWrap.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.preset=btn.dataset.preset;
      const r=computeRange(state.preset); state.from=r.from; state.to=r.to;
      document.getElementById('fromDate').value=r.from;
      document.getElementById('toDate').value=r.to;
      render();
    });
    document.getElementById('applyCustom').addEventListener('click',()=>{
      const f=document.getElementById('fromDate').value, t=document.getElementById('toDate').value;
      if(!f||!t||f>t){ return; }
      presetWrap.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      state.preset='custom'; state.from=f; state.to=t; render();
    });

    // init
    document.getElementById('fromDate').value=minDate;
    document.getElementById('toDate').value=maxDate;
    render();
  </script>
